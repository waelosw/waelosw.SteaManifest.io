<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub Finder</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap');

body{
font-family:'Roboto',sans-serif;
background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
color:#e2e8f0;
min-height:100vh;
overflow-y:auto;
}

.orbitron{font-family:'Orbitron',sans-serif;}
.glow-text{text-shadow:0 0 8px rgba(59,130,246,0.7);}
.glow-box{box-shadow:0 0 15px rgba(59,130,246,0.5);}

.input-glow:focus{box-shadow:0 0 0 3px rgba(59,130,246,0.5);}

.cyber-border{
position:relative;
border:1px solid transparent;
}

.cyber-border::before{
content:''; position:absolute; inset:0; border-radius:.5rem; padding:2px;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
pointer-events:none;
}

.terminal-text{
font-family:'Courier New',monospace;
background-color:rgba(30,41,59,0.7);
border-left:3px solid #3b82f6;
position:relative;
}

.modal-overlay{
position:fixed;
top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.8);
display:flex; justify-content:center; align-items:center; z-index:1000;
}

.modal-content{
background:linear-gradient(135deg,#1e293b 0%,#334155 100%);
border:2px solid #3b82f6;
border-radius:1rem;
padding:2rem;
max-width:500px;
width:90%;
text-align:center;
box-shadow:0 0 30px rgba(59,130,246,0.5);
}

.suggestion-item{
cursor:pointer;
padding:2px 4px;
border-radius:4px;
}

.suggestion-item:hover{
background-color:rgba(59,130,246,0.3);
}

.copy-btn{
position:absolute; top:8px; right:8px;
background:#3b82f6; color:white; font-size:0.75rem;
padding:2px 6px; border-radius:4px;
cursor:pointer;
display:none;
}

@keyframes pulseSearch{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.search-animate{
animation:pulseSearch 2s infinite;
}

</style>
</head>

<body class="flex flex-col items-center justify-center p-4">

<!-- DISCLAIMER -->
<div id="disclaimerModal" class="modal-overlay">
<div class="modal-content">

<i class="fas fa-exclamation-triangle text-yellow-400 text-4xl mb-4"></i>

<h2 class="orbitron text-2xl font-bold mb-4">DISCLAIMER</h2>

<p class="text-slate-300 text-sm mb-6">
This website only displays scripts submitted by users.
Use them at your own risk.
</p>

<button id="acceptDisclaimer"
class="orbitron bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-8 rounded-lg">
I Understand & Continue
</button>

</div>
</div>

<div class="max-w-4xl w-full mx-auto">

<header class="text-center mb-10">

<h1 class="orbitron text-4xl md:text-5xl font-bold glow-text">
SCRIPT HUB FINDER
</h1>

<p class="text-slate-300 text-lg">
Search a Roblox script hub and get its script instantly
</p>

<div class="flex justify-center mt-6">
<div class="w-16 h-1 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></div>
</div>

</header>

<main class="cyber-border bg-slate-800/50 backdrop-blur-sm rounded-xl p-6 md:p-8 glow-box">

<div class="mb-8">

<label class="block text-sm font-medium text-slate-300 mb-2 orbitron">
ENTER HUB NAME
</label>

<!-- PC SEARCH -->
<div class="hidden md:block">
<div class="flex gap-2">
<input
type="text"
id="hubInput"
placeholder="ex: chilli hub"
class="input-glow flex-1 bg-slate-700/50 border border-slate-600 rounded-lg py-3 px-4 text-white"
/>

<button
id="checkBtn"
class="orbitron search-animate bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-6 rounded-lg flex items-center gap-2">
<i class="fas fa-search"></i>
SEARCH
</button>
</div>

<div id="suggestions" class="text-sm mt-1 text-slate-400"></div>
</div>

<!-- MOBILE SEARCH -->
<div class="md:hidden flex flex-col gap-2">
<input
type="text"
id="hubInputMobile"
placeholder="ex: chilli hub"
class="input-glow w-full bg-slate-700/50 border border-slate-600 rounded-lg py-3 px-4 text-white"
/>

<button
id="checkBtnMobile"
class="orbitron bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold py-3 px-8 rounded-lg">
SEARCH
</button>
</div>

</div>

<div id="resultsSection" class="hidden">
<div class="terminal-text p-5 rounded-lg">
<pre id="terminalOutput" class="text-green-400 whitespace-pre-wrap"></pre>
<div class="copy-btn" id="copyBtn">COPY SCRIPT</div>
</div>
</div>

</main>

<div class="flex justify-center mt-10">
<a href="https://discord.gg/94BJnurVqX" target="_blank">
<button
class="orbitron bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold py-3 px-8 rounded-lg">
JOIN DISCORD
</button>
</a>
</div>

<footer class="mt-6 text-center text-slate-400 text-sm">
<p>Â© 2026 Script Hub Finder</p>
</footer>

</div>

<script>

document.getElementById("acceptDisclaimer").onclick = ()=>{
document.getElementById("disclaimerModal").style.display="none"
}

const hubs={
"chilli hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-KEYLESS-TRUE-THE-BEST-STEAL-A-BRAINROT-SCRIPT-45137"))()`,
"nameless hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-nameless-hub-94511"))()`,
"lumin hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-OP-STEAL-STUFF-43223"))()`,
"kurd hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-Kurd-Hub-29484"))()`,
"sun hub":`loadstring(game:HttpGet("https://api.luarmor.net/files/v4/loaders/623c61e59524bc04f458c6f6dd2c3f8b.lua"))()`,
"Leo":`79 rue villon`
"Irad":`70 rue Maeyse bastille`
"Cemil":`432 cours Emile zola`
"Kenzo":`10 rue  de l'epargne`
"Mohamed yacine":`16 rue de la solidarité`
"example hub":`INSERT SCRIPT HERE`
}

const btn=document.getElementById("checkBtn")
const btnMobile=document.getElementById("checkBtnMobile")

const input=document.getElementById("hubInput")
const inputMobile=document.getElementById("hubInputMobile")

const terminal=document.getElementById("terminalOutput")
const results=document.getElementById("resultsSection")
const suggestionsDiv=document.getElementById("suggestions")
const copyBtn=document.getElementById("copyBtn")

let currentScript=""

btn.onclick=searchHub

btnMobile.onclick=()=>{
input.value=inputMobile.value
searchHub()
}

input.addEventListener("keypress",e=>{
if(e.key==="Enter") searchHub()
})

inputMobile.addEventListener("keypress",e=>{
if(e.key==="Enter"){
input.value=inputMobile.value
searchHub()
}
})

input.addEventListener("input",showSuggestions)

function showSuggestions(){

let value=input.value.toLowerCase()
suggestionsDiv.innerHTML=""

if(!value) return

for(let hub in hubs){

if(hub.includes(value)){

let div=document.createElement("div")
div.textContent=hub
div.className="suggestion-item"

div.onclick=()=>{
input.value=hub
suggestionsDiv.innerHTML=""
}

suggestionsDiv.appendChild(div)

}

}

}

async function searchHub(){

let name=input.value.toLowerCase().trim()

results.classList.remove("hidden")
terminal.textContent=""
copyBtn.style.display="none"

await typeText("> Searching hub database...\n")

let foundScript=null
let foundName=null

for(let hub in hubs){

if(hub.includes(name) || name.includes(hub.replace(" hub",""))){

foundScript=hubs[hub]
foundName=hub
break

}

}

if(foundScript){

currentScript=foundScript

await typeText(`> Hub found: ${foundName}\n\n`)
await typeText(foundScript)

copyBtn.style.display="block"

}else{

await typeText("> Hub not found\n")
await typeText("No script available for this hub.")

}

}

function typeText(text){

return new Promise(resolve=>{

let i=0

let interval=setInterval(()=>{

if(i<text.length){

terminal.textContent+=text.charAt(i)
i++

}else{

clearInterval(interval)
resolve()

}

},15)

})

}

copyBtn.onclick=()=>{

if(!currentScript) return

navigator.clipboard.writeText(currentScript)

copyBtn.innerText="COPIED"

setTimeout(()=>{
copyBtn.innerText="COPY SCRIPT"
},1500)

}

</script>

</body>
</html>
